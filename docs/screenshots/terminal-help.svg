<stop offset="0%" stop-color="#09111b" />
<stop offset="100%" stop-color="#111b29" />
</linearGradient>
<linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#0f1723" />
<stop offset="100%" stop-color="#111827" />
</linearGradient>
</defs>
<rect width="1600" height="100%" fill="url(#bg)" />
<rect x="44" y="40" width="1512" height="982" rx="28" fill="url(#panel)" stroke="#223147" stroke-width="2"/>
<rect x="44" y="40" width="1512" height="74" rx="28" fill="#0b1220" />
<circle cx="92" cy="77" r="10" fill="#ff5f57" />
<circle cx="124" cy="77" r="10" fill="#febc2e" />
<circle cx="156" cy="77" r="10" fill="#28c840" />
<text x="220" y="87" fill="#e6edf3" font-size="30" font-family="Consolas, Monaco, 'Courier New', monospace">Lotterymcp CLI</text>
<rect x="1260" y="56" width="228" height="40" rx="20" fill="#17314c" stroke="#2d4b69"/>
<text x="1374" y="82" text-anchor="middle" fill="#8bc5ff" font-size="22" font-family="Consolas, Monaco, 'Courier New', monospace">真实命令输出</text>
<text x="88" y="154" fill="#7ee787" font-size="28" font-family="Consolas, Monaco, 'Courier New', monospace">$ npx --yes lotterymcp@latest --help</text>
<text x="88" y="184" fill="#d7e2f0" font-size="28" font-family="Consolas, Monaco, 'Courier New', monospace">临时打开菜单:</text>
<text x="88" y="226" fill="#d7e2f0" font-size="28" font-family="Consolas, Monaco, 'Courier New', monospace">  npx --yes lotterymcp@latest</text>
<text x="88" y="268" fill="#d7e2f0" font-size="28" font-family="Consolas, Monaco, 'Courier New', monospace"></text>
<text x="88" y="310" fill="#d7e2f0" font-size="28" font-family="Consolas, Monaco, 'Courier New', monospace">全局安装:</text>
<text x="88" y="352" fill="#d7e2f0" font-size="28" font-family="Consolas, Monaco, 'Courier New', monospace">  npm i -g lotterymcp</text>
<text x="88" y="394" fill="#d7e2f0" font-size="28" font-family="Consolas, Monaco, 'Courier New', monospace"></text>
<text x="88" y="436" fill="#d7e2f0" font-size="28" font-family="Consolas, Monaco, 'Courier New', monospace">可用命令:</text>
<text x="88" y="478" fill="#d7e2f0" font-size="28" font-family="Consolas, Monaco, 'Courier New', monospace">  serve            启动 MCP stdio 服务</text>
<text x="88" y="520" fill="#d7e2f0" font-size="28" font-family="Consolas, Monaco, 'Courier New', monospace">  init             生成本地配置文件</text>
<text x="88" y="562" fill="#d7e2f0" font-size="28" font-family="Consolas, Monaco, 'Courier New', monospace">  doctor           检查当前配置和网站连通性</text>
<text x="88" y="604" fill="#d7e2f0" font-size="28" font-family="Consolas, Monaco, 'Courier New', monospace">  login            打开官网账号页并获取 Token</text>
<text x="88" y="646" fill="#d7e2f0" font-size="28" font-family="Consolas, Monaco, 'Courier New', monospace">  analyze          直接运行 Python 分析程序</text>
<text x="88" y="688" fill="#d7e2f0" font-size="28" font-family="Consolas, Monaco, 'Courier New', monospace"></text>
<text x="88" y="730" fill="#d7e2f0" font-size="28" font-family="Consolas, Monaco, 'Courier New', monospace">官网: www.neuxsbot.com</text>
<text x="88" y="772" fill="#d7e2f0" font-size="28" font-family="Consolas, Monaco, 'Courier New', monospace">传输方式: stdio</text>
<text x="88" y="814" fill="#d7e2f0" font-size="28" font-family="Consolas, Monaco, 'Courier New', monospace">彩种: 由 AI 对话动态传入，不写死在本地配置</text>
<text x="88" y="1028" fill="#5f728c" font-size="22" font-family="Consolas, Monaco, 'Courier New', monospace">NEUXSBOT • www.neuxsbot.com</text>
</svg>